# Nginx location blocks for GitHub MCP Server
# Add these to your existing mcp.techmavie.digital server block
#
# Example: sudo nano /etc/nginx/sites-available/mcp.techmavie.digital
# Then add these location blocks inside the server { } block

# GitHub MCP Server (port 8084)
location /github/ {
    proxy_pass http://127.0.0.1:8084/;
    proxy_http_version 1.1;

    # WebSocket and SSE support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts for long-running connections (SSE)
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    # Disable buffering for SSE and streaming responses
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;

    # Allow large request bodies
    client_max_body_size 10M;
}

# Server card and well-known paths (root-level proxying)
location = /.well-known/mcp/server-card.json {
    proxy_pass http://127.0.0.1:8084/.well-known/mcp/server-card.json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# OAuth metadata — deliberate 404 (not supported, prevents confusing fallback)
location /.well-known/oauth-protected-resource/ {
    return 404 '{"error": "oauth_not_supported", "message": "This server uses API key authentication, not OAuth"}';
    add_header Content-Type application/json;
}

location /.well-known/oauth-authorization-server/ {
    return 404 '{"error": "oauth_not_supported", "message": "This server uses API key authentication, not OAuth"}';
    add_header Content-Type application/json;
}
