# GitHub MCP Server - Docker Compose
# For self-hosting on VPS at mcp.techmavie.digital/github

services:
  mcp-github:
    build: .
    container_name: mcp-github
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - NODE_ENV=production
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - KEY_SERVICE_URL=${KEY_SERVICE_URL:-}
      - KEY_SERVICE_TOKEN=${KEY_SERVICE_TOKEN:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - PUBLIC_BASE_PATH=${PUBLIC_BASE_PATH:-/github}
      - MCP_PROTOCOL_VERSION=${MCP_PROTOCOL_VERSION:-2025-11-25}
      - MCP_TRACE_HTTP=${MCP_TRACE_HTTP:-false}
      - ENABLE_MCP_DIAGNOSTICS=${ENABLE_MCP_DIAGNOSTICS:-false}
      - ENABLE_SMITHERY_ENDPOINT=${ENABLE_SMITHERY_ENDPOINT:-false}
      - ANALYTICS_DIR=/app/data
    volumes:
      - analytics-data:/app/data
      - /opt/mcp-credentials:/app/.credentials:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mcp-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mcp-network:
    driver: bridge

volumes:
  analytics-data:
